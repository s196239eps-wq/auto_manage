
<style>
:root{--bg:#0d0f14;--sur:#161920;--sur2:#1e2230;--bord:#2a2f40;--acc:#f0c55a;--acc2:#4fd1c5;--red:#f56565;--ora:#f6ad55;--grn:#68d391;--txt:#e8eaf0;--mut:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
h1,h2,h3,.syne{font-family:'Syne',sans-serif}
.mono{font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bord);border-radius:3px}
.hdr{background:var(--sur);border-bottom:1px solid var(--bord);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.35rem;letter-spacing:-.5px}.logo span{color:var(--acc)}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--acc);color:#0d0f14}.btn-p:hover{background:#f7d472;transform:translateY(-1px)}
.btn-g{background:transparent;color:var(--txt);border:1px solid var(--bord)}.btn-g:hover{background:var(--sur2)}
.btn-d{background:transparent;color:var(--red);border:1px solid var(--red)}.btn-d:hover{background:rgba(245,101,101,.1)}
.btn-t{background:transparent;color:var(--acc2);border:1px solid var(--acc2)}.btn-t:hover{background:rgba(79,209,197,.1)}
.btn-sm{padding:4px 9px;font-size:.75rem;border-radius:6px}
.card{background:var(--sur);border:1px solid var(--bord);border-radius:14px;overflow:hidden;transition:border-color .2s,transform .2s}
.card:hover{border-color:#3a4060;transform:translateY(-2px)}
.chdr{background:var(--sur2);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bord)}
.targa{font-family:'DM Mono',monospace;font-weight:500;background:var(--acc);color:#0d0f14;padding:2px 9px;border-radius:5px;font-size:.85rem;letter-spacing:1px}
.cbody{padding:14px 18px}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:.72rem;font-weight:500}
.bdg-ok{background:rgba(104,211,145,.15);color:var(--grn)}.bdg-w{background:rgba(246,173,85,.15);color:var(--ora)}.bdg-d{background:rgba(245,101,101,.15);color:var(--red)}
.srow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bord);gap:6px}
.srow:last-child{border-bottom:none}
.slbl{font-size:.8rem;color:var(--mut);font-weight:500;min-width:120px}
.sval{font-family:'DM Mono',monospace;font-size:.8rem}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-ok{background:var(--grn)}.dot-w{background:var(--ora)}.dot-d{background:var(--red);box-shadow:0 0 5px var(--red)}
.ics-btn{background:none;border:none;cursor:pointer;color:var(--acc2);font-size:.95rem;padding:2px 3px;border-radius:4px;transition:background .15s;display:inline-flex;align-items:center}
.ics-btn:hover{background:rgba(79,209,197,.1)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:200;padding:12px;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.mo-box{background:var(--sur);border:1px solid var(--bord);border-radius:18px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;padding:24px;position:relative}
.mo-ttl{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:.78rem;color:var(--mut);margin-bottom:5px;font-weight:500}
.fi{width:100%;background:var(--sur2);border:1px solid var(--bord);color:var(--txt);border-radius:7px;padding:8px 11px;font-family:'DM Sans',sans-serif;font-size:.88rem;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--acc)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sdiv{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--mut);border-bottom:1px solid var(--bord);padding-bottom:7px;margin:18px 0 14px}
.empty{text-align:center;padding:60px 20px;color:var(--mut)}
.empty-ico{font-size:3.5rem;margin-bottom:14px}
.empty-ttl{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:700;margin-bottom:8px;color:var(--txt)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sur2);border:1px solid var(--bord);border-radius:9px;padding:10px 16px;font-size:.85rem;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:7px;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.prog-bar{height:6px;border-radius:3px;background:var(--sur2);overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.tabs{display:flex;gap:3px;margin-bottom:6px}
.tab{padding:5px 12px;border-radius:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;background:transparent;color:var(--mut);transition:all .15s}
.tab.act{background:var(--sur2);color:var(--txt)}
.sec-ttl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin:12px 0 8px}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.7);cursor:pointer}
@media(max-width:600px){.fr{grid-template-columns:1fr}.vgrid{grid-template-columns:1fr}.hdr{padding:10px 14px}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<header class="hdr">
  <div class="logo">Auto<span>Check</span></div>
  <button class="btn btn-p" onclick="openModal()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Aggiungi Veicolo
  </button>
</header>

<main style="padding:20px;max-width:1200px;margin:0 auto">
  <div id="statsBar" style="display:none;gap:10px;margin-bottom:20px;flex-wrap:wrap"></div>
  <div id="vgrid" class="vgrid"></div>
  <div id="emptyState" class="empty">
    <div class="empty-ico">🚗</div>
    <div class="empty-ttl">Nessun veicolo aggiunto</div>
    <p style="margin-bottom:20px;font-size:.88rem">Inizia aggiungendo il tuo primo veicolo.</p>
    <button class="btn btn-p" onclick="openModal()">Aggiungi il primo veicolo</button>
  </div>
</main>

<!-- MODAL -->
<div class="mo" id="vModal">
  <div class="mo-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div class="mo-ttl" id="mTitle">Nuovo Veicolo</div>
      <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:var(--mut);font-size:1.3rem">✕</button>
    </div>

    <div class="sdiv">Dati Veicolo</div>
    <div class="fr">
      <div class="fg"><label class="fl">Targa *</label><input class="fi mono" id="fTarga" placeholder="AB123CD" style="text-transform:uppercase"></div>
      <div class="fg"><label class="fl">KM Attuali</label><input class="fi" id="fKm" type="number" placeholder="0"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Marca *</label><input class="fi" id="fMarca" placeholder="es. Fiat"></div>
      <div class="fg"><label class="fl">Modello *</label><input class="fi" id="fModello" placeholder="es. Panda"></div>
    </div>

    <div class="sdiv">Scadenze Legali</div>
    <div class="fr">
      <div class="fg"><label class="fl">Scadenza Assicurazione</label><input class="fi" id="fAss" type="date"></div>
      <div class="fg"><label class="fl">Scadenza Revisione</label><input class="fi" id="fRev" type="date"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Scadenza Bollo</label><input class="fi" id="fBol" type="date"></div>
    </div>

    <div class="sdiv">Cambio Olio</div>
    <div class="fr">
      <div class="fg"><label class="fl">Data Ultimo Cambio Olio</label><input class="fi" id="fOlioData" type="date"></div>
      <div class="fg"><label class="fl">KM all'Ultimo Cambio</label><input class="fi" id="fOlioKmFatto" type="number" placeholder="es. 12000"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Intervallo KM Cambio Olio</label><input class="fi" id="fOlioInt" type="number" placeholder="es. 15000"></div>
    </div>

    <div class="sdiv">Gomme</div>
    <div class="fr">
      <div class="fg"><label class="fl">Stagione Gomme</label>
        <select class="fi" id="fGomme">
          <option value="">-- Seleziona --</option>
          <option value="estive">Estive</option>
          <option value="invernali">Invernali</option>
          <option value="4stagioni">4 Stagioni</option>
        </select>
      </div>
      <div class="fg"><label class="fl">KM all'Installazione Gomme</label><input class="fi" id="fGommeKm" type="number" placeholder="es. 10000"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Data Installazione Gomme</label><input class="fi" id="fGommeData" type="date"></div>
      <div class="fg"><label class="fl">Target KM Sostituzione Gomme</label><input class="fi" id="fGommeTarget" type="number" placeholder="es. 40000"></div>
    </div>

    <div class="sdiv">Freni</div>
    <div class="fr">
      <div class="fg"><label class="fl">KM Ultimo Cambio Pastiglie</label><input class="fi" id="fFreniKm" type="number" placeholder="es. 8000"></div>
      <div class="fg"><label class="fl">Target KM Prossimo Cambio</label><input class="fi" id="fFreniTarget" type="number" placeholder="es. 38000"></div>
    </div>

    <div class="sdiv">Cinghia Distribuzione</div>
    <div class="fr">
      <div class="fg"><label class="fl">KM Ultimo Cambio Cinghia</label><input class="fi" id="fCingKm" type="number" placeholder="es. 5000"></div>
      <div class="fg"><label class="fl">Target KM Prossimo Cambio</label><input class="fi" id="fCingTarget" type="number" placeholder="es. 125000"></div>
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-g" onclick="closeModal()">Annulla</button>
      <button class="btn btn-p" onclick="saveVehicle()">Salva Veicolo</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="tIco">✅</span><span id="tMsg"></span></div>

<script>
let vehicles = JSON.parse(localStorage.getItem('ac_v3')||'[]');
let editId = null;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2) }
function save(){ localStorage.setItem('ac_v3', JSON.stringify(vehicles)) }
function fmt(d){ if(!d) return '—'; const [y,m,g]=d.split('-'); return `${g}/${m}/${y}` }
function pad(n){ return String(n).padStart(2,'0') }

function getStatus(ds){
  if(!ds) return null;
  const diff=(new Date(ds)-new Date())/86400000;
  if(diff<0) return 'danger';
  if(diff<=30) return 'warning';
  return 'ok';
}
function statusBadge(ds){
  const s=getStatus(ds); if(!s) return '';
  const diff=Math.round((new Date(ds)-new Date())/86400000);
  if(s==='danger') return `<span class="bdg bdg-d"><span class="dot dot-d"></span>Scaduto</span>`;
  if(s==='warning') return `<span class="bdg bdg-w"><span class="dot dot-w"></span>${diff}gg</span>`;
  return `<span class="bdg bdg-ok"><span class="dot dot-ok"></span>OK</span>`;
}

function showToast(msg,ico='✅'){
  const t=document.getElementById('toast');
  document.getElementById('tMsg').textContent=msg;
  document.getElementById('tIco').textContent=ico;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

function toICSDate(ds){ const d=new Date(ds); return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}` }
function generateICS(ds,tipo,targa,marca,modello){
  const uid2=`ac-${Date.now()}@autocheck.app`;
  const stamp=new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//AutoCheck//IT','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',`UID:${uid2}`,`DTSTAMP:${stamp}`,`DTSTART;VALUE=DATE:${toICSDate(ds)}`,
    `DTEND;VALUE=DATE:${toICSDate(ds)}`,`SUMMARY:Scadenza ${tipo} - ${targa}`,
    `DESCRIPTION:Promemoria manutenzione auto ${marca} ${modello}. Tipo: ${tipo}.`,
    'BEGIN:VALARM','TRIGGER:-PT72H','ACTION:DISPLAY',`DESCRIPTION:Scadenza ${tipo} tra 3 giorni - ${targa}`,
    'END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`scadenza-${tipo.toLowerCase().replace(/\s/g,'-')}-${targa}.ics`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a)},1000);
  showToast(`ICS scaricato per ${tipo}`,'📅');
}

// ---- KM progress bar ----
function kmProgress(kmFatto, kmAttuale, target, label, soglia=1000){
  if(!kmFatto || !kmAttuale || !target) return '';
  const kmFattiFinora = parseInt(kmAttuale) - parseInt(kmFatto);
  const pct = Math.min(100, Math.round(kmFattiFinora/parseInt(target)*100));
  const rimanenti = parseInt(target) - kmFattiFinora;
  let col='var(--grn)', st='ok';
  if(rimanenti<=0){ col='var(--red)'; st='danger'; }
  else if(rimanenti<=soglia){ col='var(--ora)'; st='warning'; }
  const badge = st==='danger'
    ? `<span class="bdg bdg-d"><span class="dot dot-d"></span>Scaduto</span>`
    : st==='warning'
    ? `<span class="bdg bdg-w"><span class="dot dot-w"></span>Entro ${rimanenti.toLocaleString('it')} km</span>`
    : `<span class="bdg bdg-ok"><span class="dot dot-ok"></span>${rimanenti.toLocaleString('it')} km rimasti</span>`;
  return `
    <div style="margin:2px 0 6px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:.75rem;color:var(--mut)">${label}</span>
        <span style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--mut)">${pct}%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
      <div style="margin-top:4px">${badge}</div>
    </div>`;
}

// ---- Gomme info ----
function gommeInfo(v){
  if(!v.gomme) return '';
  const month=new Date().getMonth()+1;
  const isWinter=month>=11||month<=3;
  let stagAllert='';
  if(isWinter && v.gomme==='estive') stagAllert=`<span class="bdg bdg-w"><span class="dot dot-w"></span>Cambia: stagione invernale</span>`;
  else if(!isWinter && v.gomme==='invernali') stagAllert=`<span class="bdg bdg-w"><span class="dot dot-w"></span>Cambia: stagione estiva</span>`;
  else stagAllert=`<span class="bdg bdg-ok"><span class="dot dot-ok"></span>Stagione OK</span>`;

  const lbl={estive:'Estive',invernali:'Invernali','4stagioni':'4 Stagioni','':'—'};

  // km/day
  let kmGiorno='';
  if(v.gommeData && v.gommeKm && v.km){
    const days=Math.max(1,Math.round((new Date()-new Date(v.gommeData))/86400000));
    const kmPercorsi=parseInt(v.km)-parseInt(v.gommeKm);
    const kpd=kmPercorsi>0?Math.round(kmPercorsi/days):0;
    kmGiorno=`<div class="srow"><span class="slbl">📊 KM/giorno</span><span class="sval">${kpd} km</span></div>`;

    // inverter forecast
    let invRow='';
    if(v.gomme!=='4stagioni'){
      const nextInv = isWinter ? new Date(new Date().getFullYear(),3,1) : new Date(new Date().getFullYear(),10,1);
      const daysToInv=Math.round((nextInv-new Date())/86400000);
      const kmAllInv=parseInt(v.km)+(kpd*daysToInv);
      invRow=`<div class="srow"><span class="slbl">🔄 KM inversione</span><span style="font-family:'DM Mono',monospace;font-size:.8rem">~${kmAllInv.toLocaleString('it')} km<br><span style="font-size:.7rem;color:var(--mut)">tra ${daysToInv}gg</span></span></div>`;
    }

    const progGomme = v.gommeTarget ? kmProgress(v.gommeKm, v.km, v.gommeTarget, `Usura gomme (target: ${parseInt(v.gommeTarget).toLocaleString('it')} km)`, 3000) : '';
    const kmPerc=kmPercorsi>0?kmPercorsi.toLocaleString('it'):'0';

    return `
      <div class="srow"><span class="slbl">🏔 Tipo gomme</span><div style="display:flex;align-items:center;gap:6px"><span style="font-size:.8rem">${lbl[v.gomme]}</span>${stagAllert}</div></div>
      <div class="srow"><span class="slbl">📅 Installate</span><span class="sval">${fmt(v.gommeData)}</span></div>
      <div class="srow"><span class="slbl">🛣 KM installaz.</span><span class="sval">${v.gommeKm?parseInt(v.gommeKm).toLocaleString('it')+' km':'—'}</span></div>
      <div class="srow"><span class="slbl">📏 KM percorsi</span><span class="sval">${kmPerc} km</span></div>
      ${kmGiorno}
      ${invRow}
      ${progGomme}
    `;
  }
  return `<div class="srow"><span class="slbl">🏔 Tipo gomme</span><div style="display:flex;align-items:center;gap:6px"><span style="font-size:.8rem">${lbl[v.gomme]}</span>${stagAllert}</div></div>`;
}

// ---- Card render ----
function renderCard(v){
  const icsBtn=(ds,tipo)=>ds?`<button class="ics-btn" title="Aggiungi al Calendario" onclick="generateICS('${ds}','${tipo}','${v.targa}','${v.marca}','${v.modello}')">📅</button>`:'';

  // cambio olio progress
  const progOlio = v.olioKmFatto && v.km && v.olioInt
    ? kmProgress(v.olioKmFatto, v.km, v.olioInt, `Cambio olio ogni ${parseInt(v.olioInt).toLocaleString('it')} km`, 800)
    : '';

  // freni
  const progFreni = v.freniKm && v.km && v.freniTarget
    ? kmProgress(v.freniKm, v.km, parseInt(v.freniTarget)-parseInt(v.freniKm), `Pastiglie freni (target: ${parseInt(v.freniTarget).toLocaleString('it')} km)`, 2000)
    : '';

  // cinghia
  const progCing = v.cingKm && v.km && v.cingTarget
    ? kmProgress(v.cingKm, v.km, parseInt(v.cingTarget)-parseInt(v.cingKm), `Cinghia distribuzione (target: ${parseInt(v.cingTarget).toLocaleString('it')} km)`, 5000)
    : '';

  return `
  <div class="card">
    <div class="chdr">
      <div style="display:flex;align-items:center;gap:9px">
        <span class="targa">${v.targa}</span>
        <div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:.93rem">${v.marca} ${v.modello}</div>
          <div class="mono" style="font-size:.75rem;color:var(--mut)">${v.km?parseInt(v.km).toLocaleString('it')+' km':'— km'}</div>
        </div>
      </div>
      <div style="display:flex;gap:5px">
        <button class="btn btn-g btn-sm" onclick="openKmModal('${v.id}')">🔢 KM</button>
        <button class="btn btn-g btn-sm" onclick="openModal('${v.id}')">✏️</button>
        <button class="btn btn-d btn-sm" onclick="delVehicle('${v.id}')">🗑</button>
      </div>
    </div>
    <div class="cbody">
      <div id="tabs-${v.id}" style="display:flex;gap:3px;margin-bottom:10px">
        <button class="tab act" onclick="switchTab('${v.id}','scad',this)">Scadenze</button>
        <button class="tab" onclick="switchTab('${v.id}','mec',this)">Meccanica</button>
        <button class="tab" onclick="switchTab('${v.id}','gomme',this)">Gomme</button>
      </div>

      <div id="tab-scad-${v.id}">
        <div class="srow"><span class="slbl">🛡 Assicurazione</span><div style="display:flex;align-items:center;gap:6px"><span class="sval">${fmt(v.ass)}</span>${statusBadge(v.ass)}${icsBtn(v.ass,'Assicurazione')}</div></div>
        <div class="srow"><span class="slbl">🔧 Revisione</span><div style="display:flex;align-items:center;gap:6px"><span class="sval">${fmt(v.rev)}</span>${statusBadge(v.rev)}${icsBtn(v.rev,'Revisione')}</div></div>
        <div class="srow"><span class="slbl">📋 Bollo</span><div style="display:flex;align-items:center;gap:6px"><span class="sval">${fmt(v.bol)}</span>${statusBadge(v.bol)}${icsBtn(v.bol,'Bollo')}</div></div>
      </div>

      <div id="tab-mec-${v.id}" style="display:none">
        <div class="sec-ttl">Cambio Olio</div>
        <div class="srow"><span class="slbl">📅 Ultimo cambio</span><span class="sval">${fmt(v.olioData)}</span></div>
        <div class="srow"><span class="slbl">🛣 KM al cambio</span><span class="sval">${v.olioKmFatto?parseInt(v.olioKmFatto).toLocaleString('it')+' km':'—'}</span></div>
        ${progOlio}
        <div class="sec-ttl" style="margin-top:10px">Freni</div>
        <div class="srow"><span class="slbl">🛣 KM cambio past.</span><span class="sval">${v.freniKm?parseInt(v.freniKm).toLocaleString('it')+' km':'—'}</span></div>
        ${progFreni}
        <div class="sec-ttl" style="margin-top:10px">Cinghia Distribuzione</div>
        <div class="srow"><span class="slbl">🛣 KM cambio cinghia</span><span class="sval">${v.cingKm?parseInt(v.cingKm).toLocaleString('it')+' km':'—'}</span></div>
        ${progCing}
      </div>

      <div id="tab-gomme-${v.id}" style="display:none">
        ${gommeInfo(v)}
      </div>
    </div>
  </div>`;
}

function switchTab(id, tab, btn){
  ['scad','mec','gomme'].forEach(t=>{
    const el=document.getElementById(`tab-${t}-${id}`);
    if(el) el.style.display=t===tab?'':'none';
  });
  document.querySelectorAll(`#tabs-${id} .tab`).forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
}

function render(){
  const grid=document.getElementById('vgrid');
  const empty=document.getElementById('emptyState');
  const stats=document.getElementById('statsBar');
  if(!vehicles.length){ grid.innerHTML=''; empty.style.display='block'; stats.style.display='none'; return; }
  empty.style.display='none'; stats.style.display='flex';
  const exp=vehicles.filter(v=>['ass','rev','bol'].some(k=>getStatus(v[k])==='danger')).length;
  const war=vehicles.filter(v=>['ass','rev','bol'].some(k=>getStatus(v[k])==='warning')).length;
  // also check km alerts
  const mecAlert=vehicles.filter(v=>{
    const checks=[
      {km:v.olioKmFatto,int:v.olioInt},{km:v.freniKm,tgt:v.freniTarget},{km:v.cingKm,tgt:v.cingTarget}
    ];
    return checks.some(c=>{
      if(!c.km||!v.km) return false;
      const rem = c.int ? parseInt(c.int)-(parseInt(v.km)-parseInt(c.km)) : c.tgt ? parseInt(c.tgt)-parseInt(v.km) : null;
      return rem!==null && rem<=0;
    });
  }).length;

  stats.innerHTML=`
    <div style="background:var(--sur);border:1px solid var(--bord);border-radius:9px;padding:8px 14px;display:flex;align-items:center;gap:7px;font-size:.83rem">
      🚗 <b>${vehicles.length}</b> veicolo${vehicles.length!==1?'i':''}
    </div>
    ${exp?`<div style="background:rgba(245,101,101,.1);border:1px solid rgba(245,101,101,.3);border-radius:9px;padding:8px 14px;display:flex;align-items:center;gap:7px;font-size:.83rem;color:var(--red)">⚠️ <b>${exp}</b> scaduto/i</div>`:''}
    ${war?`<div style="background:rgba(246,173,85,.1);border:1px solid rgba(246,173,85,.3);border-radius:9px;padding:8px 14px;display:flex;align-items:center;gap:7px;font-size:.83rem;color:var(--ora)">🔔 <b>${war}</b> in scadenza</div>`:''}
    ${mecAlert?`<div style="background:rgba(245,101,101,.1);border:1px solid rgba(245,101,101,.3);border-radius:9px;padding:8px 14px;display:flex;align-items:center;gap:7px;font-size:.83rem;color:var(--red)">🔧 <b>${mecAlert}</b> manutenzione scaduta</div>`:''}
  `;
  grid.innerHTML=vehicles.map(renderCard).join('');
}

// ---- Modal ----
function openModal(id=null){
  editId=id;
  document.getElementById('mTitle').textContent=id?'Modifica Veicolo':'Nuovo Veicolo';
  const flds=['Targa','Km','Marca','Modello','Ass','Rev','Bol','OlioData','OlioKmFatto','OlioInt','Gomme','GommeKm','GommeData','GommeTarget','FreniKm','FreniTarget','CingKm','CingTarget'];
  flds.forEach(f=>{const el=document.getElementById('f'+f);if(el)el.value='';});
  if(id){
    const v=vehicles.find(x=>x.id===id);
    if(v){
      document.getElementById('fTarga').value=v.targa||'';
      document.getElementById('fKm').value=v.km||'';
      document.getElementById('fMarca').value=v.marca||'';
      document.getElementById('fModello').value=v.modello||'';
      document.getElementById('fAss').value=v.ass||'';
      document.getElementById('fRev').value=v.rev||'';
      document.getElementById('fBol').value=v.bol||'';
      document.getElementById('fOlioData').value=v.olioData||'';
      document.getElementById('fOlioKmFatto').value=v.olioKmFatto||'';
      document.getElementById('fOlioInt').value=v.olioInt||'';
      document.getElementById('fGomme').value=v.gomme||'';
      document.getElementById('fGommeKm').value=v.gommeKm||'';
      document.getElementById('fGommeData').value=v.gommeData||'';
      document.getElementById('fGommeTarget').value=v.gommeTarget||'';
      document.getElementById('fFreniKm').value=v.freniKm||'';
      document.getElementById('fFreniTarget').value=v.freniTarget||'';
      document.getElementById('fCingKm').value=v.cingKm||'';
      document.getElementById('fCingTarget').value=v.cingTarget||'';
    }
  }
  document.getElementById('vModal').classList.add('open');
}
function closeModal(){ document.getElementById('vModal').classList.remove('open'); editId=null; }

function saveVehicle(){
  const targa=document.getElementById('fTarga').value.trim().toUpperCase();
  const marca=document.getElementById('fMarca').value.trim();
  const modello=document.getElementById('fModello').value.trim();
  if(!targa||!marca||!modello){ showToast('Compila Targa, Marca e Modello','⚠️'); return; }
  const data={
    id:editId||uid(), targa, marca, modello,
    km:document.getElementById('fKm').value,
    ass:document.getElementById('fAss').value,
    rev:document.getElementById('fRev').value,
    bol:document.getElementById('fBol').value,
    olioData:document.getElementById('fOlioData').value,
    olioKmFatto:document.getElementById('fOlioKmFatto').value,
    olioInt:document.getElementById('fOlioInt').value,
    gomme:document.getElementById('fGomme').value,
    gommeKm:document.getElementById('fGommeKm').value,
    gommeData:document.getElementById('fGommeData').value,
    gommeTarget:document.getElementById('fGommeTarget').value,
    freniKm:document.getElementById('fFreniKm').value,
    freniTarget:document.getElementById('fFreniTarget').value,
    cingKm:document.getElementById('fCingKm').value,
    cingTarget:document.getElementById('fCingTarget').value,
  };
  if(editId){ vehicles=vehicles.map(v=>v.id===editId?data:v); showToast('Veicolo aggiornato!','✏️'); }
  else { vehicles.push(data); showToast('Veicolo aggiunto!','🚗'); }
  save(); closeModal(); render();
}

function delVehicle(id){
  if(!confirm('Eliminare questo veicolo?')) return;
  vehicles=vehicles.filter(v=>v.id!==id); save(); render();
  showToast('Eliminato','🗑');
}

function openKmModal(id){
  const v=vehicles.find(x=>x.id===id);
  const km=prompt(`Aggiorna KM per ${v.targa} ${v.marca} ${v.modello}\nKM attuali: ${v.km||'—'}`,v.km||'');
  if(km===null) return;
  const n=parseInt(km);
  if(isNaN(n)||n<0){ showToast('KM non validi','⚠️'); return; }
  vehicles=vehicles.map(v2=>v2.id===id?{...v2,km:n}:v2);
  save(); render();
  showToast(`KM aggiornati: ${n.toLocaleString('it')}`,'🔢');
}

document.getElementById('vModal').addEventListener('click',function(e){if(e.target===this)closeModal()});
render();
</script>
